<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>独立家教管理系统</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <style>
        /* 全局样式与变量 */
        :root {
            --primary-pink: #ff8e91;
            --primary-blue: #5cafff;
            --bg-color: linear-gradient(135deg, #eef2f3 0%, #ffe0e0 50%, #e0f2ff 100%);
            --sidebar-glass: rgba(255, 255, 255, 0.5);
            --card-glass: rgba(255, 255, 255, 0.9);
            --text-color: #333;
            --sub-text-color: #666;
        }
        * { box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { margin: 0; padding: 15px; background: var(--bg-color); min-height: 100vh; color: var(--text-color); }

        /* 布局容器 */
        #wrapper { display: flex; gap: 20px; align-items: flex-start; }

        /* ======== 侧边栏/顶部区域 ======== */
        #sidebar { 
            width: 300px; 
            background: var(--sidebar-glass); 
            backdrop-filter: blur(10px); 
            border-radius: 15px; 
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            flex-shrink: 0; 
        }
        .brand { display: flex; align-items: center; gap: 15px; margin-bottom: 15px;}
        .brand-icon { width: 40px; height: 40px; background: conic-gradient(from 180deg at 50% 50%, #ff6b6b, #4dabf7, #66d9e8, #ff6b6b); border-radius: 50%;}
        .brand-info h1 { font-size: 18px; margin: 0; }
        
        .nav-links { list-style: none; padding: 0; margin: 0 0 20px 0; display: flex; flex-direction: column; gap: 5px; }
        .nav-links li { padding: 12px 15px; border-radius: 8px; cursor: pointer; font-size: 15px; transition: 0.2s; color: var(--sub-text-color);}
        .nav-links li.active { background: rgba(92, 175, 255, 0.15); color: var(--primary-blue); font-weight: bold;}

        /* 表单通用样式 */
        .glass-form { background: rgba(255, 142, 145, 0.1); border: 1px solid rgba(255, 142, 145, 0.2); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .glass-form.blue-theme { background: rgba(92, 175, 255, 0.1); border-color: rgba(92, 175, 255, 0.2); }
        .form-group { margin: 0; }
        .form-group label { font-size: 12px; color: var(--sub-text-color); margin-bottom: 6px; display: block;}
        .form-group input, .form-group select { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 10px; font-size: 14px; background: white;}
        select optgroup { font-weight: bold; color: var(--primary-blue); font-style: normal; }
        
        button.btn-pink { background: var(--primary-pink); border-radius: 8px; border: none; color: white; font-size: 14px; font-weight: bold; padding: 12px; cursor: pointer; width: 100%; transition: opacity 0.2s;}
        button.btn-blue { background: var(--primary-blue); border-radius: 8px; border: none; color: white; font-size: 14px; font-weight: bold; padding: 12px; cursor: pointer; width: 100%; transition: opacity 0.2s;}
        button:active { opacity: 0.8; }

        /* ======== 右侧主内容区域 ======== */
        #main-content { 
            flex-grow: 1; 
            background: var(--card-glass); 
            border-radius: 15px; 
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: calc(100% - 320px); 
        }
        .main-header { font-size: 18px; font-weight: bold; margin: 0 0 15px 0; padding-bottom: 10px; border-bottom: 1px solid #eee;}

        /* 新增：统计面板样式 */
        .stats-panel {
            display: flex;
            gap: 20px;
            background: rgba(92, 175, 255, 0.08);
            border: 1px solid rgba(92, 175, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .stat-item { font-size: 13px; color: var(--sub-text-color); flex: 1;}
        .stat-value { font-size: 20px; font-weight: bold; color: var(--primary-blue); margin-top: 5px;}
        .stat-value.income { color: #ff6b6b; }

        /* 日历样式微调 */
        .fc { --fc-border-color: #eee; font-size: 12px; }
        .fc-header-toolbar { flex-wrap: wrap; gap: 10px; margin-bottom: 15px !important; }
        .fc-toolbar-title { font-size: 16px !important; }
        .fc .fc-button { padding: 5px 10px; font-size: 12px; }
        .event-card { display: flex; align-items: center; gap: 5px; font-size: 11px; width: 100%; overflow: hidden;}
        .event-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;}
        .event-time-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold;}

        /* 学生列表卡片样式 */
        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .student-card { background: white; border: 1px solid #eee; border-radius: 10px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); position: relative;}
        .st-name { font-size: 16px; font-weight: bold; color: var(--primary-blue); margin-bottom: 5px;}
        .st-info { font-size: 13px; color: var(--sub-text-color); margin: 3px 0; display: flex; align-items: center; gap: 5px;}
        .btn-delete { position: absolute; right: 15px; top: 15px; background: #ffebeb; color: #ff4d4f; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;}

        /* 隐藏功能类 */
        .hidden { display: none !important; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            #wrapper { flex-direction: column; gap: 15px; }
            #sidebar, #main-content { width: 100%; }
            #main-content { padding: 15px; }
            .fc-toolbar-chunk { display: flex; justify-content: center; width: 100%; margin-bottom: 5px;}
            .stats-panel { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="sidebar">
        <div class="brand">
            <div class="brand-icon"></div>
            <div class="brand-info">
                <h1>排课管理 / Tutor</h1>
            </div>
        </div>

        <ul class="nav-links">
            <li id="tab-calendar" class="active" onclick="switchTab('calendar')"><i>📅</i> 课表排期</li>
            <li id="tab-students" onclick="switchTab('students')"><i>📁</i> 学生档案</li>
        </ul>

        <div id="form-calendar" class="glass-form">
            <div class="form-group">
                <label>选择学生:</label>
                <select id="eventStudentId">
                    <option value="">请先在[学生档案]添加学生</option>
                </select>
            </div>
            <div class="form-group">
                <label>上课日期:</label>
                <input type="date" id="eventDate">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1;">
                    <label>开始:</label>
                    <input type="time" id="eventStart" value="18:00">
                </div>
                <div class="form-group" style="flex:1;">
                    <label>结束:</label>
                    <input type="time" id="eventEnd" value="20:00">
                </div>
            </div>
            <button class="btn-pink" onclick="addEvent()">💾 快捷排课</button>
        </div>

        <div id="form-students" class="glass-form blue-theme hidden">
            <div class="form-group">
                <label>学生姓名:</label>
                <input type="text" id="stName" placeholder="如：李小明">
            </div>
            
            <div class="form-group">
                <label>辅导年级及科目:</label>
                <div style="display: flex; gap: 10px;">
                    <select id="stGrade" style="flex: 1.2;">
                        <optgroup label="小学阶段">
                            <option value="一年级">一年级</option>
                            <option value="二年级">二年级</option>
                            <option value="三年级">三年级</option>
                            <option value="四年级">四年级</option>
                            <option value="五年级">五年级</option>
                            <option value="六年级">六年级</option>
                        </optgroup>
                        <optgroup label="初中阶段">
                            <option value="初一">初一</option>
                            <option value="初二" selected>初二</option>
                            <option value="初三">初三</option>
                        </optgroup>
                        <optgroup label="高中阶段">
                            <option value="高一">高一</option>
                            <option value="高二">高二</option>
                            <option value="高三">高三</option>
                        </optgroup>
                    </select>
                    
                    <select id="stSubjectName" style="flex: 1;">
                        <option value="语文">语文</option>
                        <option value="数学" selected>数学</option>
                        <option value="英语">英语</option>
                        <option value="物理">物理</option>
                        <option value="化学">化学</option>
                        <option value="生物">生物</option>
                        <option value="政治">政治</option>
                        <option value="历史">历史</option>
                        <option value="地理">地理</option>
                        <option value="全科">全科</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>课时单价 (元/小时):</label>
                <input type="number" id="stPrice" placeholder="如：150">
            </div>
            <div class="form-group">
                <label>上门地址 (选填):</label>
                <input type="text" id="stAddress" placeholder="如：阳光小区3栋">
            </div>
            <button class="btn-blue" onclick="saveStudent()">➕ 新增学生</button>
        </div>
    </div>

    <div id="main-content">
        <div id="page-calendar">
            <h2 class="main-header">我的课表</h2>
            
            <div class="stats-panel">
                <div class="stat-item">
                    当前视图总课时 (小时)
                    <div class="stat-value" id="stat-hours">0.0</div>
                </div>
                <div class="stat-item">
                    当前视图预计总收入 (元)
                    <div class="stat-value income" id="stat-fee">¥ 0.00</div>
                </div>
            </div>

            <div id='calendar'></div>
        </div>

        <div id="page-students" class="hidden">
            <h2 class="main-header">已存学生档案</h2>
            <div id="student-list" class="student-grid">
                </div>
        </div>
    </div>
</div>

<script>
    let calendar;
    // 数据存储
    let eventsData = JSON.parse(localStorage.getItem('myTutorEvents')) || [];
    let studentsData = JSON.parse(localStorage.getItem('myTutorStudents')) || [];

    document.addEventListener('DOMContentLoaded', function() {
        initCalendar();
        renderStudentList();
        updateStudentDropdown();
    });

    // ================== 页面切换逻辑 ==================
    function switchTab(tabName) {
        document.getElementById('tab-calendar').classList.remove('active');
        document.getElementById('tab-students').classList.remove('active');
        document.getElementById('tab-' + tabName).classList.add('active');

        document.getElementById('form-calendar').classList.add('hidden');
        document.getElementById('form-students').classList.add('hidden');
        document.getElementById('form-' + tabName).classList.remove('hidden');

        document.getElementById('page-calendar').classList.add('hidden');
        document.getElementById('page-students').classList.add('hidden');
        document.getElementById('page-' + tabName).classList.remove('hidden');

        if(tabName === 'calendar' && calendar) {
            calendar.render();
        }
    }

    // ================== 学生档案管理逻辑 ==================
    function saveStudent() {
        let name = document.getElementById('stName').value.trim();
        let grade = document.getElementById('stGrade').value;
        let subjectName = document.getElementById('stSubjectName').value;
        let price = document.getElementById('stPrice').value.trim();
        let address = document.getElementById('stAddress').value.trim();

        if (!name) {
            alert("学生姓名是必填项哦！");
            return;
        }

        let fullSubject = grade + subjectName;

        let newStudent = {
            id: Date.now().toString(),
            name: name,
            subject: fullSubject,
            price: price,
            address: address
        };

        studentsData.push(newStudent);
        localStorage.setItem('myTutorStudents', JSON.stringify(studentsData));
        
        document.getElementById('stName').value = '';
        document.getElementById('stPrice').value = '';
        document.getElementById('stAddress').value = '';

        renderStudentList();
        updateStudentDropdown();
        alert("学生添加成功！");
    }

    function deleteStudent(id) {
        if(confirm("确定要删除这位学生档案吗？(已排的课程不会被删除)")) {
            studentsData = studentsData.filter(s => s.id !== id);
            localStorage.setItem('myTutorStudents', JSON.stringify(studentsData));
            renderStudentList();
            updateStudentDropdown();
        }
    }

    function renderStudentList() {
        let listDiv = document.getElementById('student-list');
        listDiv.innerHTML = '';

        if(studentsData.length === 0) {
            listDiv.innerHTML = '<p style="color:#999; font-size:14px;">暂无学生档案，请在左侧添加。</p>';
            return;
        }

        studentsData.forEach(st => {
            let card = document.createElement('div');
            card.className = 'student-card';
            card.innerHTML = `
                <button class="btn-delete" onclick="deleteStudent('${st.id}')">删除</button>
                <div class="st-name">${st.name}</div>
                <div class="st-info">📚 科目: ${st.subject}</div>
                <div class="st-info">💰 单价: ${st.price ? st.price + '元/小时' : '未设定'}</div>
                <div class="st-info">📍 地址: ${st.address || '未填写'}</div>
            `;
            listDiv.appendChild(card);
        });
    }

    function updateStudentDropdown() {
        let select = document.getElementById('eventStudentId');
        select.innerHTML = '';

        if(studentsData.length === 0) {
            select.innerHTML = '<option value="">请先在[学生档案]添加</option>';
            return;
        }

        studentsData.forEach(st => {
            let opt = document.createElement('option');
            opt.value = st.id; // 核心改进：存储真实的学生ID，方便拉取价格
            opt.text = `${st.name} (${st.subject})`;
            select.appendChild(opt);
        });
    }


    // ================== 日历排课与计费逻辑 ==================
    function initCalendar() {
        var calendarEl = document.getElementById('calendar');

        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            locale: 'zh-cn',
            height: 'auto', 
            slotMinTime: '08:00:00',
            slotMaxTime: '21:00:00',
            allDaySlot: false, 
            headerToolbar: {
                left: 'prev,next',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGrid
