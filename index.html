<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>独立家教管理系统 - 状态打卡版</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <style>
        /* 全局样式与变量 */
        :root {
            --primary-pink: #ff8e91;
            --primary-blue: #5cafff;
            --status-pending: #5cafff; /* 待上课：蓝色 */
            --status-completed: #4caf50; /* 已上课：绿色 */
            --status-canceled: #757575; /* 核心修改：请假圆点换成更深的灰色 */
            --bg-color: linear-gradient(135deg, #eef2f3 0%, #ffe0e0 50%, #e0f2ff 100%);
            --sidebar-glass: rgba(255, 255, 255, 0.5);
            --card-glass: rgba(255, 255, 255, 0.9);
            --text-color: #333;
            --sub-text-color: #666;
        }
        * { box-sizing: border-box; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { margin: 0; padding: 15px; background: var(--bg-color); min-height: 100vh; color: var(--text-color); }

        /* 布局容器 */
        #wrapper { display: flex; gap: 20px; align-items: flex-start; }

        /* ======== 侧边栏/顶部区域 ======== */
        #sidebar { 
            width: 300px; 
            background: var(--sidebar-glass); 
            backdrop-filter: blur(10px); 
            border-radius: 15px; 
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            flex-shrink: 0; 
        }
        .brand { display: flex; align-items: center; gap: 15px; margin-bottom: 15px;}
        .brand-icon { width: 40px; height: 40px; background: conic-gradient(from 180deg at 50% 50%, #ff6b6b, #4dabf7, #66d9e8, #ff6b6b); border-radius: 50%;}
        .brand-info h1 { font-size: 18px; margin: 0; }
        
        .nav-links { list-style: none; padding: 0; margin: 0 0 20px 0; display: flex; flex-direction: column; gap: 5px; }
        .nav-links li { padding: 12px 15px; border-radius: 8px; cursor: pointer; font-size: 15px; transition: 0.2s; color: var(--sub-text-color);}
        .nav-links li.active { background: rgba(92, 175, 255, 0.15); color: var(--primary-blue); font-weight: bold;}

        /* 表单通用样式 */
        .glass-form { background: rgba(255, 142, 145, 0.1); border: 1px solid rgba(255, 142, 145, 0.2); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .glass-form.blue-theme { background: rgba(92, 175, 255, 0.1); border-color: rgba(92, 175, 255, 0.2); }
        .form-group { margin: 0; }
        .form-group label { font-size: 12px; color: var(--sub-text-color); margin-bottom: 6px; display: block;}
        .form-group input, .form-group select { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 10px; font-size: 14px; background: white;}
        select optgroup { font-weight: bold; color: var(--primary-blue); font-style: normal; }
        
        button.btn-pink { background: var(--primary-pink); border-radius: 8px; border: none; color: white; font-size: 14px; font-weight: bold; padding: 12px; cursor: pointer; width: 100%; transition: opacity 0.2s;}
        button.btn-blue { background: var(--primary-blue); border-radius: 8px; border: none; color: white; font-size: 14px; font-weight: bold; padding: 12px; cursor: pointer; width: 100%; transition: opacity 0.2s;}
        button:active { opacity: 0.8; }

        /* ======== 右侧主内容区域 ======== */
        #main-content { 
            flex-grow: 1; 
            background: var(--card-glass); 
            border-radius: 15px; 
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: calc(100% - 320px); 
        }
        .main-header { font-size: 18px; font-weight: bold; margin: 0 0 15px 0; padding-bottom: 10px; border-bottom: 1px solid #eee;}

        /* 统计面板 */
        .stats-panel { display: flex; gap: 20px; background: rgba(92, 175, 255, 0.08); border: 1px solid rgba(92, 175, 255, 0.2); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .stat-item { font-size: 13px; color: var(--sub-text-color); flex: 1;}
        .stat-value { font-size: 20px; font-weight: bold; color: var(--primary-blue); margin-top: 5px;}
        .stat-value.income { color: #ff6b6b; }

        /* 日历样式微调 */
        .fc { --fc-border-color: #eee; font-size: 12px; }
        .fc-header-toolbar { flex-wrap: wrap; gap: 10px; margin-bottom: 15px !important; }
        .fc-toolbar-title { font-size: 16px !important; }
        .fc .fc-button { padding: 5px 10px; font-size: 12px; }
        
        .event-card { display: flex; align-items: center; gap: 5px; font-size: 11px; width: 100%; overflow: hidden;}
        .event-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;}
        .event-time-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold;}
        
        /* 核心修改：移除变淡效果，加深文字颜色，保证看得清 */
        .event-card.status-canceled-text { text-decoration: line-through; }
        .event-card.status-canceled-text .event-time-name { color: #555; }

        /* 学生列表卡片 */
        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .student-card { background: white; border: 1px solid #eee; border-radius: 10px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); position: relative;}
        .st-name { font-size: 16px; font-weight: bold; color: var(--primary-blue); margin-bottom: 5px;}
        .st-info { font-size: 13px; color: var(--sub-text-color); margin: 3px 0; display: flex; align-items: center; gap: 5px;}
        .btn-delete { position: absolute; right: 15px; top: 15px; background: #ffebeb; color: #ff4d4f; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;}

        /* 自定义状态选择弹窗 */
        #statusModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center;
            z-index: 9999; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 12px;
        }
        .modal-title { font-size: 16px; font-weight: bold; text-align: center; margin-bottom: 5px; color: #333; word-break: break-all;}
        .modal-btn { padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: background 0.2s;}
        .btn-complete { background: #e8f5e9; color: #2e7d32; } 
        .btn-cancel { background: #ffebee; color: #c62828; }   
        .btn-reset { background: #e3f2fd; color: #1565c0; }    
        .btn-remove { background: #f5f5f5; color: #616161; border: 1px dashed #ccc;} 
        .btn-close { background: #333; color: white; margin-top: 5px;} 

        .hidden { display: none !important; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            #wrapper { flex-direction: column; gap: 15px; }
            #sidebar, #main-content { width: 100%; }
            #main-content { padding: 15px; }
            .fc-toolbar-chunk { display: flex; justify-content: center; width: 100%; margin-bottom: 5px;}
            .stats-panel { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="sidebar">
        <div class="brand">
            <div class="brand-icon"></div>
            <div class="brand-info">
                <h1>排课管理 / Tutor</h1>
            </div>
        </div>

        <ul class="nav-links">
            <li id="tab-calendar" class="active" onclick="switchTab('calendar')"><i>📅</i> 课表排期</li>
            <li id="tab-students" onclick="switchTab('students')"><i>📁</i> 学生档案</li>
        </ul>

        <div id="form-calendar" class="glass-form">
            <div class="form-group">
                <label>选择学生:</label>
                <select id="eventStudentId">
                    <option value="">请先在[学生档案]添加学生</option>
                </select>
            </div>
            <div class="form-group">
                <label>上课日期:</label>
                <input type="date" id="eventDate">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1;">
                    <label>开始:</label>
                    <input type="time" id="eventStart" value="18:00">
                </div>
                <div class="form-group" style="flex:1;">
                    <label>结束:</label>
                    <input type="time" id="eventEnd" value="20:00">
                </div>
            </div>
            <button class="btn-pink" onclick="addEvent()">💾 快捷排课</button>
        </div>

        <div id="form-students" class="glass-form blue-theme hidden">
            <div class="form-group">
                <label>学生姓名:</label>
                <input type="text" id="stName" placeholder="如：李小明">
            </div>
            
            <div class="form-group">
                <label>辅导年级及科目:</label>
                <div style="display: flex; gap: 10px;">
                    <select id="stGrade" style="flex: 1.2;">
                        <optgroup label="小学阶段">
                            <option value="一年级">一年级</option>
                            <option value="二年级">二年级</option>
                            <option value="三年级">三年级</option>
                            <option value="四年级">四年级</option>
                            <option value="五年级">五年级</option>
                            <option value="六年级">六年级</option>
                        </optgroup>
                        <optgroup label="初中阶段">
                            <option value="初一">初一</option>
                            <option value="初二" selected>初二</option>
                            <option value="初三">初三</option>
                        </optgroup>
                        <optgroup label="高中阶段">
                            <option value="高一">高一</option>
                            <option value="高二">高二</option>
                            <option value="高三">高三</option>
                        </optgroup>
                    </select>
                    
                    <select id="stSubjectName" style="flex: 1;">
                        <option value="语文">语文</option>
                        <option value="数学" selected>数学</option>
                        <option value="英语">英语</option>
                        <option value="物理">物理</option>
                        <option value="化学">化学</option>
                        <option value="生物">生物</option>
                        <option value="政治">政治</option>
                        <option value="历史">历史</option>
                        <option value="地理">地理</option>
                        <option value="全科">全科</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>课时单价 (元/小时):</label>
                <input type="number" id="stPrice" placeholder="如：150">
            </div>
            <div class="form-group">
                <label>上门地址 (选填):</label>
                <input type="text" id="stAddress" placeholder="如：阳光小区3栋">
            </div>
            <button class="btn-blue" onclick="saveStudent()">➕ 新增学生</button>
        </div>
    </div>

    <div id="main-content">
        <div id="page-calendar">
            <h2 class="main-header">我的课表</h2>
            
            <div class="stats-panel">
                <div class="stat-item">
                    当前视图有效总课时 (小时)
                    <div class="stat-value" id="stat-hours">0.0</div>
                </div>
                <div class="stat-item">
                    当前视图预计总收入 (元)
                    <div class="stat-value income" id="stat-fee">¥ 0.00</div>
                </div>
            </div>

            <div id='calendar'></div>
        </div>

        <div id="page-students" class="hidden">
            <h2 class="main-header">已存学生档案</h2>
            <div id="student-list" class="student-grid">
                </div>
        </div>
    </div>
</div>

<div id="statusModal" class="hidden">
    <div class="modal-content">
        <div class="modal-title" id="modalEventTitle">课程操作</div>
        <button class="modal-btn btn-complete" onclick="setEventStatus('completed')">✅ 标记已上课 (变绿)</button>
        <button class="modal-btn btn-cancel" onclick="setEventStatus('canceled')">❌ 学生请假 (变灰划线)</button>
        <button class="modal-btn btn-reset" onclick="setEventStatus('pending')">📅 恢复为待上课 (变蓝)</button>
        <button class="modal-btn btn-remove" onclick="setEventStatus('delete')">🗑️ 彻底删除这节课</button>
        <button class="modal-btn btn-close" onclick="closeModal()">取消</button>
    </div>
</div>

<script>
    let calendar;
    let currentClickedEvent = null; 
    
    // 数据读取
    let eventsData = JSON.parse(localStorage.getItem('myTutorEvents')) || [];
    let studentsData = JSON.parse(localStorage.getItem('myTutorStudents')) || [];

    document.addEventListener('DOMContentLoaded', function() {
        initCalendar();
        renderStudentList();
        updateStudentDropdown();
    });

    // ================== 页面切换逻辑 ==================
    function switchTab(tabName) {
        document.getElementById('tab-calendar').classList.remove('active');
        document.getElementById('tab-students').classList.remove('active');
        document.getElementById('tab-' + tabName).classList.add('active');

        document.getElementById('form-calendar').classList.add('hidden');
        document.getElementById('form-students').classList.add('hidden');
        document.getElementById('form-' + tabName).classList.remove('hidden');

        document.getElementById('page-calendar').classList.add('hidden');
        document.getElementById('page-students').classList.add('hidden');
        document.getElementById('page-' + tabName).classList.remove('hidden');

        if(tabName === 'calendar' && calendar) {
            calendar.render();
            refreshStats();
        }
    }

    // ================== 统计计算逻辑 ==================
    function refreshStats(calInstance) {
        let cal = calInstance || calendar;
        if (!cal) return;

        let viewStart = cal.view.activeStart;
        let viewEnd = cal.view.activeEnd;
        let currentEvents = cal.getEvents();
        
        let totalHours = 0;
        let totalFee = 0;

        currentEvents.forEach(ev => {
            if (ev.start >= viewStart && ev.start < viewEnd) {
                let status = ev.extendedProps.status || 'pending';
                if (status !== 'canceled') {
                    let durationHours = (ev.end - ev.start) / (1000 * 60 * 60);
                    let price = parseFloat(ev.extendedProps.price) || 0; 
                    totalHours += durationHours;
                    totalFee += (durationHours * price);
                }
            }
        });

        document.getElementById('stat-hours').innerText = totalHours.toFixed(1);
        document.getElementById('stat-fee').innerText = '¥ ' + totalFee.toFixed(2);
    }

    // ================== 学生档案管理逻辑 ==================
    function saveStudent() {
        let name = document.getElementById('stName').value.trim();
        let grade = document.getElementById('stGrade').value;
        let subjectName = document.getElementById('stSubjectName').value;
        let price = document.getElementById('stPrice').value.trim();
        let address = document.getElementById('stAddress').value.trim();

        if (!name) {
            alert("学生姓名是必填项哦！");
            return;
        }

        let fullSubject = grade + subjectName;
        let newStudent = {
            id: Date.now().toString(),
            name: name,
            subject: fullSubject,
            price: price,
            address: address
        };

        studentsData.push(newStudent);
        localStorage.setItem('myTutorStudents', JSON.stringify(studentsData));
        
        document.getElementById('stName').value = '';
        document.getElementById('stPrice').value = '';
        document.getElementById('stAddress').value = '';

        renderStudentList();
        updateStudentDropdown();
        alert("学生添加成功！");
    }

    function deleteStudent(id) {
        if(confirm("确定要删除这位学生档案吗？(已排的课程不会被删除)")) {
            studentsData = studentsData.filter(s => s.id !== id);
            localStorage.setItem('myTutorStudents', JSON.stringify(studentsData));
            renderStudentList();
            updateStudentDropdown();
        }
    }

    function renderStudentList() {
        let listDiv = document.getElementById('student-list');
        listDiv.innerHTML = '';

        if(studentsData.length === 0) {
            listDiv.innerHTML = '<p style="color:#999; font-size:14px;">暂无学生档案，请在左侧添加。</p>';
            return;
        }

        studentsData.forEach(st => {
            let card = document.createElement('div');
            card.className = 'student-card';
            card.innerHTML = `
                <button class="btn-delete" onclick="deleteStudent('${st.id}')">删除</button>
                <div class="st-name">${st.name}</div>
                <div class="st-info">📚 科目: ${st.subject}</div>
                <div class="st-info">💰 单价: ${st.price ? st.price + '元/小时' : '未设定'}</div>
                <div class="st-info">📍 地址: ${st.address || '未填写'}</div>
            `;
            listDiv.appendChild(card);
        });
    }

    function updateStudentDropdown() {
        let select = document.getElementById('eventStudentId');
        select.innerHTML = '';

        if(studentsData.length === 0) {
            select.innerHTML = '<option value="">请先在[学生档案]添加</option>';
            return;
        }

        studentsData.forEach(st => {
            let opt = document.createElement('option');
            opt.value = st.id; 
            opt.text = `${st.name} (${st.subject})`;
            select.appendChild(opt);
        });
    }

    // ================== 日历排课与打卡联动逻辑 ==================
    function initCalendar() {
        var calendarEl = document.getElementById('calendar');

        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            locale: 'zh-cn',
            height: 'auto', 
            slotMinTime: '08:00:00',
            slotMaxTime: '21:00:00',
            allDaySlot: false, 
            headerToolbar: {
                left: 'prev,next',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            buttonText: { month: '月', week: '周', day: '日' },
            events: eventsData,
            
            datesSet: function(info) {
                refreshStats(info.view.calendar);
            },
            
            eventContent: function(arg) {
                let timeStr = arg.event.start.getHours() + ':' + String(arg.event.start.getMinutes()).padStart(2, '0');
                let nameStr = arg.event.title;
                let status = arg.event.extendedProps.status || 'pending';
                
                let dotColor = 'var(--status-pending)';
                let cardClass = 'event-card';
                if(status === 'completed') dotColor = 'var(--status-completed)';
                if(status === 'canceled') {
                    dotColor = 'var(--status-canceled)';
                    cardClass = 'event-card status-canceled-text'; 
                }

                let cardEl = document.createElement('div');
                cardEl.className = cardClass;
                cardEl.innerHTML = `
                    <div class="event-dot" style="background-color: ${dotColor};"></div>
                    <div class="event-time-name">${timeStr} ${nameStr}</div>
                `;
                return { domNodes: [cardEl] };
            },
            
            eventClick: function(info) {
                currentClickedEvent = info.event;
                document.getElementById('modalEventTitle').innerText = "操作课程：" + info.event.title;
                document.getElementById('statusModal').classList.remove('hidden');
            }
        });
        calendar.render();
    }

    function setEventStatus(status) {
        if (!currentClickedEvent) return;

        if (status === 'delete') {
            if (confirm("确定要彻底删除 【" + currentClickedEvent.title + "】 的排课吗？")) {
                currentClickedEvent.remove();
            }
        } else {
            currentClickedEvent.setExtendedProp('status', status);
            
            // 核心修改：让请假状态的方块背景色变成更饱满的不透明灰色
            if(status === 'pending') {
                currentClickedEvent.setProp('backgroundColor', 'var(--status-pending)');
                currentClickedEvent.setProp('borderColor', 'var(--status-pending)');
            } else if(status === 'completed') {
                currentClickedEvent.setProp('backgroundColor', 'rgba(76, 175, 80, 0.2)'); 
                currentClickedEvent.setProp('borderColor', 'var(--status-completed)');
            } else if(status === 'canceled') {
                currentClickedEvent.setProp('backgroundColor', '#e0e0e0'); // 更清晰的实体浅灰色
                currentClickedEvent.setProp('borderColor', '#9e9e9e'); // 边框也加深
            }
        }

        saveEventsToLocal();
        refreshStats();
        closeModal();
    }

    function closeModal() {
        document.getElementById('statusModal').classList.add('hidden');
        currentClickedEvent = null;
    }

    function addEvent() {
        let selectEl = document.getElementById('eventStudentId');
        let studentId = selectEl.value; 
        let date = document.getElementById('eventDate').value;
        let start = document.getElementById('eventStart').value;
        let end = document.getElementById('eventEnd').value;

        if (studentsData.length === 0 || !studentId) {
            alert('请先切换到【学生档案】页面添加一个学生！');
            return;
        }

        if (!date || !start || !end) {
            alert('请选择上课的日期和时间！');
            return;
        }

        let newStart = new Date(date + 'T' + start + ':00');
        let newEnd = new Date(date + 'T' + end + ':00');

        if (newStart >= newEnd) {
            alert('结束时间必须晚于开始时间哦！');
            return;
        }

        let existingEvents = calendar.getEvents();
        let hasConflict = false;

        for (let i = 0; i < existingEvents.length; i++) {
            let evStart = existingEvents[i].start;
            let evEnd = existingEvents[i].end;
            let evStatus = existingEvents[i].extendedProps.status || 'pending';

            if (evStatus !== 'canceled') {
                if (newStart < evEnd && newEnd > evStart) {
                    hasConflict = true;
                    break;
                }
            }
        }

        if (hasConflict) {
            alert('⚠️ 时间冲突警告！该时间段你已经安排了其他有效课程，请修改时间。');
            return; 
        }

        let studentObj = studentsData.find(s => s.id === studentId);
        let studentPrice = studentObj ? parseFloat(studentObj.price) || 0 : 0;
        let displayTitle = selectEl.options[selectEl.selectedIndex].text;

        calendar.addEvent({
            title: displayTitle, 
            start: date + 'T' + start + ':00',
            end: date + 'T' + end + ':00',
            backgroundColor: 'var(--status-pending)', 
            borderColor: 'var(--status-pending)',
            extendedProps: { 
                price: studentPrice,
                status: 'pending' 
            }
        });

        saveEventsToLocal();
        refreshStats();
        alert('排课成功！');
    }

    function saveEventsToLocal() {
        let events = calendar.getEvents().map(function(e) {
            return {
                title: e.title,
                start: e.startStr,
                end: e.endStr,
                price: e.extendedProps.price,
                status: e.extendedProps.status || 'pending',
                backgroundColor: e.backgroundColor,
                borderColor: e.borderColor
            };
        });
        localStorage.setItem('myTutorEvents', JSON.stringify(events));
    }
</script>
</body>
</html>
