<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汇率计算器 - Ultimate 3D Glass</title>
    <style>
        /* ================= 全局重置与设计变量 ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        :root {
            /* 主题紫罗兰色与发光参数 */
            --primary: #6b5aed;
            --primary-grad: linear-gradient(135deg, #8176ff 0%, #5648ed 100%);
            --primary-glow: 0 12px 24px -4px rgba(86, 72, 237, 0.55), 0 6px 12px -2px rgba(86, 72, 237, 0.4);
            
            /* 辅色薄荷青与发光参数 */
            --secondary: #3bc2ad;
            --secondary-grad: linear-gradient(135deg, #9af2e4 0%, #4bc4b4 100%);
            --secondary-glow: 0 12px 24px -4px rgba(75, 196, 180, 0.5), 0 6px 12px -2px rgba(75, 196, 180, 0.3);
            
            /* 🔥 3D 实体玻璃核心模具 🔥 */
            --glass-surface: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.3) 100%);
            --glass-border: 1px solid rgba(255, 255, 255, 0.5);
            --glass-edge-light: 1.5px solid rgba(255, 255, 255, 1); /* 模拟左上角的锐利高光切边 */
            
            /* 组合阴影：底部悬浮投影 + 底部接触投影 + 内部受光面白高光 + 内部背光面暗厚度 */
            --btn-shadow: 
                0 8px 16px -4px rgba(0, 0, 0, 0.08), 
                0 4px 6px -2px rgba(0, 0, 0, 0.04),
                inset 2px 3px 5px rgba(255, 255, 255, 0.9), 
                inset -2px -3px 5px rgba(0, 0, 0, 0.05);
                
            /* 按下时的阴影：整体向内凹陷 */
            --btn-shadow-active: 
                0 2px 4px -2px rgba(0, 0, 0, 0.04), 
                inset 3px 4px 8px rgba(0, 0, 0, 0.08), 
                inset -2px -2px 4px rgba(255, 255, 255, 0.5);

            --text-main: #2d3748;
            --text-sub: #718096;
        }

        /* 底部桌面：稍微偏冷的银灰色，给玻璃提供折射源 */
        body {
            background-color: #dbe4ef;
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            padding: 16px; /* 重点：留白！让手机端四周也能露出背景，体现这块亚克力板是“悬浮放置”的 */
            position: relative; overflow-x: hidden;
        }

        /* 环境漫反射光球 (制造彩色折射源) */
        .ambient-orbs { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -1; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; }
        .orb-1 { top: -10%; left: -10%; width: 450px; height: 450px; background: #8176ff; }
        .orb-2 { bottom: -10%; right: -10%; width: 450px; height: 450px; background: #3ccab5; }
        .orb-3 { top: 40%; left: 50%; width: 350px; height: 350px; background: rgba(255, 182, 193, 0.4); }

        /* ================= 核心：整块加厚的亚克力主板 ================= */
        .app-container {
            width: 100%; max-width: 440px; min-height: calc(100vh - 32px);
            /* 玻璃材质基础 */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.45) 0%, rgba(255, 255, 255, 0.1) 100%);
            backdrop-filter: blur(40px) saturate(130%); -webkit-backdrop-filter: blur(40px) saturate(130%);
            border-radius: 40px; padding: 28px 24px; position: relative; z-index: 1;
            
            /* 雕刻亚克力板的物理边缘：左上亮，右下暗 */
            border: var(--glass-border);
            border-top: var(--glass-edge-light); border-left: var(--glass-edge-light);
            
            /* 巨型悬浮阴影 + 亚克力内部边缘折射 */
            box-shadow: 
                0 40px 80px -10px rgba(0, 0, 0, 0.15), 
                inset 0 0 0 1px rgba(255, 255, 255, 0.3);
            
            display: flex; flex-direction: column; overflow: hidden; /* 必须加，用来裁切表面的斜向反光 */
        }
        
        @media (min-width: 500px) { .app-container { min-height: 800px; margin: 20px 0; } }

        /* 🔥 神来之笔：亚克力板表面的斜向大反光 (Glare) 🔥 */
        .app-container::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(
                115deg, transparent 35%, 
                rgba(255, 255, 255, 0.4) 45%, 
                rgba(255, 255, 255, 0.05) 50%, transparent 55%
            );
            pointer-events: none; z-index: 0;
        }
        .app-container > * { position: relative; z-index: 1; } /* 保证内容不被反光层挡住 */

        /* ================= 汇率信息区 (向内挖空的凹陷托盘) ================= */
        .rate-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 28px; padding: 20px; margin-bottom: 24px;
            /* 和凸起的按键相反，这里用深色内阴影做出向下挖槽的凹陷感 */
            border-top: 1px solid rgba(0, 0, 0, 0.04); border-left: 1px solid rgba(0, 0, 0, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.6); border-right: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: inset 2px 3px 8px rgba(0, 0, 0, 0.04);
        }
        .rate-current-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .rate-input-group { display: flex; align-items: center; gap: 10px; }
        .rate-input-group label { font-size: 15px; font-weight: 800; text-shadow: 0 1px 1px #fff; }

        /* 输入框 (模拟原图 Search bar 的凹槽药丸) */
        .rate-input-group input {
            width: 110px; height: 44px;
            background: rgba(255, 255, 255, 0.35); border: 1px solid rgba(255, 255, 255, 0.5);
            border-top: 1px solid rgba(0, 0, 0, 0.08); border-left: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 22px; font-size: 18px; font-weight: 900; color: var(--primary);
            text-align: center; outline: none; transition: 0.2s;
            box-shadow: inset 3px 3px 6px rgba(0, 0, 0, 0.08), inset -3px -3px 6px rgba(255, 255, 255, 0.9), 0 1px 1px rgba(255, 255, 255, 0.8);
        }
        .rate-input-group input:focus {
            background: rgba(255, 255, 255, 0.7);
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.05), inset -2px -2px 4px rgba(255, 255, 255, 1), 0 0 0 3px rgba(59, 194, 173, 0.3);
        }

        /* 薄荷青：带彩色漫反射发光的果冻键 (对应原图 Secondary) */
        .btn-history {
            height: 40px; padding: 0 20px;
            background: var(--secondary-grad);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 20px; font-size: 14px; color: #fff; cursor: pointer; font-weight: 800; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.15); transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            /* 多重阴影：发光阴影 + 顶部白高光 + 底部黑厚度 */
            box-shadow: var(--secondary-glow), inset 2px 3px 5px rgba(255, 255, 255, 0.5), inset -2px -3px 5px rgba(0, 0, 0, 0.15);
        }
        .btn-history:active { transform: translateY(3px) scale(0.96); box-shadow: 0 4px 8px -2px rgba(75, 196, 180, 0.5), inset 3px 4px 8px rgba(0, 0, 0, 0.15); }

        .rate-quick-row { display: flex; align-items: center; gap: 10px; border-top: 1px solid rgba(255, 255, 255, 0.5); padding-top: 16px; }
        .quick-label { font-size: 13px; color: var(--text-sub); font-weight: 700; white-space: nowrap; text-shadow: 0 1px 1px #fff; }

        /* 🔥 极其立体的玻璃实体凸出小按键 🔥 */
        .quick-btn, .btn-setting {
            flex: 1; height: 38px;
            background: var(--glass-surface); border: var(--glass-border); border-top: var(--glass-edge-light); border-left: var(--glass-edge-light);
            border-radius: 19px; font-size: 14px; font-weight: 800; color: var(--text-main); text-shadow: 0 1px 1px #fff; cursor: pointer; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--btn-shadow);
        }
        .btn-setting { background: linear-gradient(135deg, rgba(107, 90, 237, 0.15) 0%, rgba(107, 90, 237, 0.02) 100%); color: var(--primary); text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
        
        .quick-btn:active, .btn-setting:active { transform: translateY(3px) scale(0.96); box-shadow: var(--btn-shadow-active); background: rgba(255, 255, 255, 0.5); }

        /* ================= 金额显示区 (厚度发光卡片) ================= */
        .display-row { display: flex; gap: 16px; margin-bottom: 24px; }
        .currency-box {
            flex: 1; background: linear-gradient(135deg, rgba(255, 255, 255, 0.7) 0%, rgba(255, 255, 255, 0.2) 100%);
            border: var(--glass-border); border-top: var(--glass-edge-light); border-left: var(--glass-edge-light);
            border-radius: 28px; padding: 22px 12px; text-align: center; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--btn-shadow);
        }
        .currency-box.active {
            background: rgba(255, 255, 255, 0.95); border-color: #fff; transform: translateY(-5px);
            /* 激活时投射出绝美的紫色光斑 */
            box-shadow: var(--primary-glow), inset 2px 2px 5px #fff, inset -2px -2px 5px rgba(0, 0, 0, 0.03);
        }
        .currency-btn { display: inline-block; font-size: 14px; font-weight: 800; margin-bottom: 12px; color: var(--text-sub); text-shadow: 0 1px 1px #fff; pointer-events: none; }
        .currency-box.active .currency-btn { color: var(--primary); text-shadow: none; }
        .currency-amount { font-size: 28px; font-weight: 900; word-break: break-all; color: var(--text-main); text-shadow: 0 1px 2px rgba(255,255,255,0.8); }
        .currency-box.active .currency-amount { color: var(--primary); text-shadow: none; }

        /* ================= 真正的 3D 水晶键盘 ================= */
        .numpad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: auto; padding-bottom: 5px;}
        .numpad button {
            height: 68px;
            background: var(--glass-surface); border: var(--glass-border); border-top: var(--glass-edge-light); border-left: var(--glass-edge-light);
            border-radius: 22px; font-size: 24px; font-weight: 800; color: var(--text-main); text-shadow: 0 1px 1px #fff;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--btn-shadow); /* 套用 3D 实体阴影引擎 */
        }
        .numpad button:active { transform: translateY(4px) scale(0.94); box-shadow: var(--btn-shadow-active); background: rgba(255, 255, 255, 0.6); }
        .numpad button.action { font-size: 16px; color: var(--text-sub); background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(255,255,255,0.2)); }
        .numpad > div { background: transparent !important; border: none !important; box-shadow: none !important; pointer-events: none; }

        /* 🔥 紫罗兰液态发光主键 (对应原图 Start Project) 🔥 */
        .numpad button.save {
            background: var(--primary-grad); color: #fff; font-size: 18px; border: 1px solid rgba(255, 255, 255, 0.4); 
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            box-shadow: var(--primary-glow), inset 2px 3px 5px rgba(255, 255, 255, 0.5), inset -2px -3px 5px rgba(0, 0, 0, 0.2);
        }
        .numpad button.save:active { background: #5648ed; box-shadow: 0 6px 12px -2px rgba(86, 72, 237, 0.5), inset 3px 4px 8px rgba(0, 0, 0, 0.3); }

        /* ================= 历史记录页面细节对齐 ================= */
        #historyPage { display: none; flex-direction: column; flex: 1; height: 100%; }
        
        .back-btn {
            margin-bottom: 24px; padding: 12px 24px; align-self: flex-start;
            background: var(--glass-surface); border: var(--glass-border); border-top: var(--glass-edge-light); border-left: var(--glass-edge-light);
            border-radius: 20px; font-size: 15px; font-weight: 800; color: var(--text-main); text-shadow: 0 1px 1px #fff;
            cursor: pointer; box-shadow: var(--btn-shadow); transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .back-btn:active { transform: translateY(3px) scale(0.95); box-shadow: var(--btn-shadow-active); background: rgba(255, 255, 255, 0.6); }

        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .history-header h3 { font-size: 22px; font-weight: 800; color: var(--text-main); margin: 0; text-shadow: 0 1px 2px #fff; }

        .wan-toggle-btn {
            height: 40px; padding: 0 18px;
            background: var(--glass-surface); border: var(--glass-border); border-top: var(--glass-edge-light); border-left: var(--glass-edge-light);
            border-radius: 20px; font-size: 13px; font-weight: 800; color: var(--text-main); cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--btn-shadow); text-shadow: 0 1px 1px #fff;
        }
        .wan-toggle-btn.active {
            background: var(--primary-grad) !important; color: white !important; border: none !important; text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            box-shadow: var(--primary-glow), inset 2px 3px 5px rgba(255, 255, 255, 0.4), inset -2px -3px 5px rgba(0, 0, 0, 0.2) !important;
        }
        .wan-toggle-btn:active { transform: translateY(3px) scale(0.95); box-shadow: var(--btn-shadow-active); }

        .history-list { list-style: none; margin-bottom: 24px; max-height: 55vh; overflow-y: auto; padding-right: 8px; flex: 1; }
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 5px; }

        .history-item {
            background: rgba(255, 255, 255, 0.4); border: var(--glass-border); border-top: var(--glass-edge-light); border-left: var(--glass-edge-light);
            border-radius: 24px; padding: 20px; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.03), inset 2px 3px 5px rgba(255,255,255,0.8);
        }
        .item-content { flex: 1; }
        .item-line { display: flex; align-items: center; margin-bottom: 6px; font-size: 14px; }
        .line-label { width: 80px; color: var(--text-sub); font-weight: 700; display: inline-block; font-size: 13px; text-shadow: 0 1px 1px #fff; }
        .line-val { font-size: 16px; font-weight: 900; color: var(--text-main); text-shadow: 0 1px 1px #fff; }

        .item-actions { display: flex; flex-direction: column; gap: 10px; margin-left: 12px; }
        .action-btn {
            padding: 8px 0; width: 64px; background: var(--glass-surface); border: var(--glass-border); border-top: var(--glass-edge-light); border-left: var(--glass-edge-light);
            border-radius: 16px; font-size: 13px; font-weight: 800; cursor: pointer; text-shadow: 0 1px 1px #fff;
            box-shadow: var(--btn-shadow); transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .action-btn:active { transform: translateY(3px) scale(0.92); box-shadow: var(--btn-shadow-active); background: rgba(255,255,255,0.6); }
        .btn-copy { color: var(--text-main); }
        .btn-del { color: #e11d48; }

        .export-btn, .clear-btn { width: 100%; height: 56px; border-radius: 28px; font-size: 16px; cursor: pointer; margin-bottom: 16px; font-weight: 800; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; }
        
        .export-btn {
            background: var(--secondary-grad); color: #fff; border: 1px solid rgba(255, 255, 255, 0.4); text-shadow: 0 1px 2px rgba(0,0,0,0.15);
            box-shadow: var(--secondary-glow), inset 2px 3px 5px rgba(255, 255, 255, 0.5), inset -2px -3px 5px rgba(0, 0, 0, 0.15);
        }
        .export-btn:active { transform: translateY(3px) scale(0.98); box-shadow: 0 4px 8px -2px rgba(75, 196, 180, 0.5), inset 3px 4px 8px rgba(0, 0, 0, 0.15); }

        .clear-btn {
            background: var(--glass-surface); color: #e11d48; 
            border: var(--glass-border); border-top: var(--glass-edge-light); border-left: var(--glass-edge-light); text-shadow: 0 1px 1px #fff;
            box-shadow: var(--btn-shadow);
        }
        .clear-btn:active { transform: translateY(3px) scale(0.98); box-shadow: var(--btn-shadow-active); background: rgba(255,255,255,0.6); }

        /* ================= 底部厚重悬浮 Toast ================= */
        #toast {
            position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5); border-top: 1.5px solid #fff; border-left: 1.5px solid #fff;
            color: var(--primary); padding: 14px 32px; border-radius: 30px; font-size: 15px; font-weight: 800;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; pointer-events: none; z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), inset 2px 3px 5px rgba(255, 255, 255, 1);
        }
        #toast.show { bottom: 40px; opacity: 1; }
    </style>
</head>
<body>

<div class="ambient-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div class="app-container" id="calcPage">
    <div class="rate-card">
        <div class="rate-current-row">
            <div class="rate-input-group">
                <label>💱 当前汇率</label>
                <input type="number" id="rateInput" value="0.920" step="0.001" onchange="calc()" oninput="calc()">
            </div>
            <button class="btn-history" onclick="switchPage('history')">📜 历史</button>
        </div>
        <div class="rate-quick-row">
            <span class="quick-label">常用快捷:</span>
            <button class="quick-btn" id="btnQuick0" onclick="applyQuickRate(0)">0.920</button>
            <button class="quick-btn" id="btnQuick1" onclick="applyQuickRate(1)">0.930</button>
            <button class="btn-setting" onclick="editQuickRates()">⚙️ 自定义</button>
        </div>
    </div>

    <div class="display-row">
        <div class="currency-box active" id="boxRmb" onclick="setFocus('rmb')">
            <div class="currency-btn">🔴 人民币 (¥)</div>
            <div class="currency-amount"><span id="valRmb">0</span></div>
        </div>
        <div class="currency-box" id="boxHkd" onclick="setFocus('hkd')">
            <div class="currency-btn">🔵 港币 ($)</div>
            <div class="currency-amount"><span id="valHkd">0</span></div>
        </div>
    </div>

    <div class="numpad">
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button class="action" onclick="press('DEL')">删除</button>
        
        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button class="action" onclick="press('C')">清空</button>
        
        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <div></div> <button onclick="press('.')">.</button>
        <button onclick="press('0')">0</button>
        <button onclick="press('0000')">0000</button>
        <button class="save" onclick="saveRecord()">保存</button>
    </div>
</div>

<div class="app-container" id="historyPage">
    <button class="back-btn" onclick="switchPage('calc')">⬅️ 返回</button>
    
    <div class="history-header">
        <h3>📜 保存的计算</h3>
        <button id="wanToggleBtn" class="wan-toggle-btn" onclick="toggleWanUnit()">单位:万</button>
    </div>
    
    <ul class="history-list" id="historyList"></ul>
    
    <button class="export-btn" onclick="exportHistory()">📥 导出 Excel (.csv)</button>
    <button class="clear-btn" onclick="clearHistory()">🗑️ 清空记录</button>
</div>

<div id="toast">✨ 已应用</div>

<script>
    let focus = 'rmb'; 
    let values = { rmb: '', hkd: '' };
    let historyData = JSON.parse(localStorage.getItem('currencyHistory')) || [];
    let quickRates = JSON.parse(localStorage.getItem('quickRates')) || ["0.920", "0.930"];
    
    let showWanSpacing = localStorage.getItem('showWanSpacing') === 'true';

    const domRmb = document.getElementById('valRmb');
    const domHkd = document.getElementById('valHkd');
    const boxRmb = document.getElementById('boxRmb');
    const boxHkd = document.getElementById('boxHkd');
    const rateInput = document.getElementById('rateInput');
    const btnQuick0 = document.getElementById('btnQuick0');
    const btnQuick1 = document.getElementById('btnQuick1');
    const wanToggleBtn = document.getElementById('wanToggleBtn');

    window.onload = function() {
        const savedState = JSON.parse(localStorage.getItem('calcState'));
        if (savedState) {
            values = savedState.values || { rmb: '', hkd: '' };
            rateInput.value = savedState.rate || quickRates[0];
            focus = savedState.focus || 'rmb';
            setFocus(focus);
            updateDisplay();
        }
        renderQuickRates();
        updateWanButtonUI();
    }

    function renderQuickRates() {
        btnQuick0.innerText = quickRates[0];
        btnQuick1.innerText = quickRates[1];
    }

    function applyQuickRate(index) {
        rateInput.value = quickRates[index];
        calc();
        saveCurrentState();
        showToast("已切换汇率: " + quickRates[index]);
    }

    function editQuickRates() {
        let r1 = prompt("⚙️ 设置常用汇率 1:", quickRates[0]);
        if (r1 !== null && !isNaN(r1) && r1 > 0) quickRates[0] = parseFloat(r1).toFixed(3);
        
        let r2 = prompt("⚙️ 设置常用汇率 2:", quickRates[1]);
        if (r2 !== null && !isNaN(r2) && r2 > 0) quickRates[1] = parseFloat(r2).toFixed(3);
        
        localStorage.setItem('quickRates', JSON.stringify(quickRates));
        renderQuickRates();
        showToast("快捷汇率已更新");
    }

    function saveCurrentState() {
        const state = { values: values, rate: rateInput.value, focus: focus };
        localStorage.setItem('calcState', JSON.stringify(state));
    }

    function setFocus(target) {
        focus = target;
        if (target === 'rmb') {
            boxRmb.classList.add('active'); boxHkd.classList.remove('active');
        } else {
            boxHkd.classList.add('active'); boxRmb.classList.remove('active');
        }
        saveCurrentState();
    }

    function calc() {
        let rate = parseFloat(rateInput.value);
        if (isNaN(rate) || rate <= 0) return;
        if (focus === 'rmb') {
            if (values.rmb === '') values.hkd = '';
            else values.hkd = (parseFloat(values.rmb) / rate).toFixed(2);
        } else {
            if (values.hkd === '') values.rmb = '';
            else values.rmb = (parseFloat(values.hkd) * rate).toFixed(2);
        }
        updateDisplay();
        saveCurrentState();
    }

    function press(val) {
        let current = values[focus];
        if (val === 'C') { values.rmb = ''; values.hkd = ''; } 
        else if (val === 'DEL') { values[focus] = current.slice(0, -1); } 
        else if (val === '.') {
            if (!current.includes('.')) values[focus] = current === '' ? '0.' : current + '.';
        } 
        else { values[focus] = current + val; }
        calc();
    }

    function updateDisplay() {
        domRmb.innerText = values.rmb === '' ? '0' : values.rmb;
        domHkd.innerText = values.hkd === '' ? '0' : values.hkd;
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function getFullTimeString() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
    }

    function saveRecord() {
        if (values.rmb === '' || values.hkd === '') return;
        const record = { 
            time: getFullTimeString(), 
            rate: rateInput.value, 
            rmb: parseFloat(values.rmb).toFixed(2), 
            hkd: parseFloat(values.hkd).toFixed(2) 
        };
        historyData.unshift(record); 
        localStorage.setItem('currencyHistory', JSON.stringify(historyData));
        showToast("✨ 计算已保存");
    }

    function toggleWanUnit() {
        showWanSpacing = !showWanSpacing;
        localStorage.setItem('showWanSpacing', showWanSpacing);
        updateWanButtonUI();
        renderHistory();
    }

    function updateWanButtonUI() {
        if (showWanSpacing) {
            wanToggleBtn.classList.add('active');
        } else {
            wanToggleBtn.classList.remove('active');
        }
    }

    function formatNumberWithWanSpace(numStr) {
        let val = parseFloat(numStr).toFixed(2);
        if (!showWanSpacing) return val; 
        
        let parts = val.split('.');
        let intPart = parts[0];
        let decPart = parts[1];
        
        if (intPart.length > 4) {
            let wan = intPart.slice(0, -4);
            let remainder = intPart.slice(-4);
            return `${wan}<span style="display:inline-block; width:14px;"></span>${remainder}.${decPart}`;
        }
        return val;
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        if (historyData.length === 0) {
            list.innerHTML = '<li class="history-item" style="justify-content:center; color:var(--text-sub); border:none; box-shadow:none;">暂无记录</li>'; return;
        }
        historyData.forEach((item, index) => {
            const li = document.createElement('li'); 
            li.className = 'history-item';
            li.innerHTML = `
                <div class="item-content">
                    <div style="color: var(--text-sub); font-size: 12px; margin-bottom: 8px; font-weight:700; text-shadow:0 1px 1px #fff;">🕒 ${item.time}</div>
                    <div class="item-line">
                        <span class="line-label">💱 汇率:</span>
                        <span class="line-val" style="color:var(--primary)">${item.rate}</span>
                    </div>
                    <div class="item-line">
                        <span class="line-label">🔴 人民币:</span>
                        <span class="line-val">¥ ${formatNumberWithWanSpace(item.rmb)}</span>
                    </div>
                    <div class="item-line">
                        <span class="line-label">🔵 港币:</span>
                        <span class="line-val">$ ${formatNumberWithWanSpace(item.hkd)}</span>
                    </div>
                </div>
                <div class="item-actions">
                    <button class="action-btn btn-copy" onclick="copyRecord(${index})">复制</button>
                    <button class="action-btn btn-del" onclick="deleteRecord(${index})">删除</button>
                </div>
            `;
            list.appendChild(li);
        });
    }

    function deleteRecord(index) {
        if(confirm("确定要删除这条记录吗？")) {
            historyData.splice(index, 1);
            localStorage.setItem('currencyHistory', JSON.stringify(historyData));
            renderHistory();
            showToast("🗑️ 已删除");
        }
    }

    function copyRecord(index) {
        const item = historyData[index];
        const text = `时间: ${item.time}\n汇率: ${item.rate}\n人民币: ¥${item.rmb}\n港币: $${item.hkd}`;
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => showToast("📋 复制成功"));
        } else {
            let textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try { document.execCommand('copy'); showToast("📋 复制成功"); } 
            catch (err) { showToast("❌ 复制失败"); }
            textArea.remove();
        }
    }

    function exportHistory() {
        if (historyData.length === 0) {
            showToast("⚠️ 没有记录可导出");
            return;
        }
        let csvContent = "\uFEFF时间,汇率,人民币,港币\n";
        historyData.forEach(item => { csvContent += `${item.time},${item.rate},${item.rmb},${item.hkd}\n`; });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `汇率计算记录_${new Date().getTime()}.csv`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showToast("📥 导出成功");
    }

    function clearHistory() {
        if(confirm("⚠️ 警告：确定要清空所有记录吗？此操作不可恢复！")) {
            historyData = [];
            localStorage.removeItem('currencyHistory');
            renderHistory();
            showToast("🗑️ 记录已清空");
        }
    }

    function switchPage(page) {
        if (page === 'history') {
            document.getElementById('calcPage').style.display = 'none';
            document.getElementById('historyPage').style.display = 'flex';
            renderHistory();
        } else {
            document.getElementById('calcPage').style.display = 'flex';
            document.getElementById('historyPage').style.display = 'none';
        }
    }
</script>
</body>
</html>
